<header class="mb-10">
  <div class="navbar rounded-box border border-base-300/60 bg-base-100/80 px-3 shadow-sm backdrop-blur">
    <div class="flex-1">
      <a href="/" class="flex items-center gap-3">
        <span class="flex min-h-10 min-w-10 items-center justify-center rounded-2xl bg-primary px-3 text-sm font-bold text-primary-content shadow-sm">{{appTitleCamel}}</span>
        <div>
          <p class="text-sm font-semibold tracking-wide text-base-content/70">Starter Kit</p>
          <p class="text-lg font-bold leading-none">{{appTitle}}</p>
        </div>
      </a>
    </div>
    <div class="flex items-center gap-2">
      <a href="#features" class="btn btn-ghost btn-sm hidden sm:inline-flex">Features</a>
      <a href="#stack" class="btn btn-ghost btn-sm hidden sm:inline-flex">Stack</a>
      <button
        type="button"
        class="btn btn-ghost btn-sm gap-2"
        hx-post="/theme/toggle"
        hx-swap="none"
        onclick="toggleTheme()"
      >
        <span data-theme-icon-sun aria-hidden="true">Sun</span>
        <span data-theme-icon-moon class="hidden" aria-hidden="true">Moon</span>
        <span data-theme-label>Light</span>
      </button>
      <a href="#launch" class="btn btn-primary btn-sm">Launch Faster</a>
    </div>
  </div>
</header>
