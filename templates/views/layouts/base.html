<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{appTitle}}</title>

    <script>
        (function() {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }

            const theme = getCookie('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <script src="/assets/bundle.js" defer></script>
    <link rel="stylesheet" href="/assets/styles.css">

    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen bg-base-100 text-base-content antialiased">
    <div class="relative isolate overflow-hidden">
        <div class="absolute inset-x-0 top-0 -z-10 h-96 bg-[radial-gradient(circle_at_top,oklch(var(--p)/0.18),transparent_55%)]"></div>
        <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 py-6 sm:px-6 lg:px-8">
            {{template "partials/headers" .}}
            <div class="flex-1">
                {{embed}}
            </div>
            {{template "partials/footers" .}}
        </main>
    </div>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        function syncThemeToggle(theme) {
            document.querySelectorAll('[data-theme-label]').forEach((label) => {
                label.textContent = theme === 'dark' ? 'Dark' : 'Light';
            });

            document.querySelectorAll('[data-theme-icon-sun]').forEach((icon) => {
                icon.classList.toggle('hidden', theme === 'dark');
            });

            document.querySelectorAll('[data-theme-icon-moon]').forEach((icon) => {
                icon.classList.toggle('hidden', theme !== 'dark');
            });
        }

        function toggleTheme() {
            const currentTheme = getCookie('theme') || document.documentElement.getAttribute('data-theme') || 'light';
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';

            document.documentElement.setAttribute('data-theme', nextTheme);
            syncThemeToggle(nextTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            syncThemeToggle(document.documentElement.getAttribute('data-theme') || 'light');
        });
    </script>
</body>
</html>
